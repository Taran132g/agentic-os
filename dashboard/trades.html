<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRADES — J.A.R.V.I.S</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#05080f; --bg2:#070b14;
  --panel:rgba(0,210,255,0.030); --panel2:rgba(0,210,255,0.058);
  --border:rgba(0,210,255,0.14);
  --c:#00d4ff; --c2:#7dd8e8;
  --g:#00ff7f; --g2:#00cc66;
  --o:#ffb700; --r:#ff4d4d; --p:#b06eff;
  --text:#cce6f5; --dim:#7aabbf; --bright:#eef7ff; --muted:#1a3544;
  --mono:'Share Tech Mono','JetBrains Mono',monospace;
  --sans:'Rajdhani','Segoe UI',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:11px;display:flex;flex-direction:column;
  background-image:radial-gradient(ellipse at 50% 0%,rgba(0,140,255,.07) 0%,transparent 55%),
    radial-gradient(ellipse at 0% 100%,rgba(0,80,180,.04) 0%,transparent 40%);}
body::after{content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,.05) 0px,rgba(0,0,0,.05) 1px,transparent 1px,transparent 3px);
  pointer-events:none;z-index:9999;}
@keyframes fadein{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}

/* TOP BAR */
.top-bar{flex-shrink:0;height:42px;background:rgba(2,6,14,.98);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:10px;position:relative;}
.top-bar::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--c) 20%,var(--c) 80%,transparent);opacity:.22;}
.back-link{font-family:var(--sans);font-size:9px;font-weight:700;letter-spacing:.18em;
  color:var(--dim);text-decoration:none;text-transform:uppercase;}
.back-link:hover{color:var(--c);}
.page-title{font-family:var(--sans);font-size:14px;font-weight:700;letter-spacing:.25em;
  color:var(--bright);text-transform:uppercase;flex:1;text-align:center;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--g);animation:pulse 2s infinite;}

/* BANKROLL HEADER */
.bankroll-bar{flex-shrink:0;padding:10px 16px;border-bottom:1px solid var(--border);
  display:flex;gap:16px;align-items:center;background:rgba(0,210,255,.02);}
.stat-block{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:80px;}
.stat-label{font-size:8px;letter-spacing:.15em;color:var(--dim);text-transform:uppercase;}
.stat-value{font-size:16px;font-family:var(--sans);font-weight:700;color:var(--bright);}
.stat-value.pos{color:var(--g);}
.stat-value.neg{color:var(--r);}
.stat-value.warn{color:var(--o);}
.divider{width:1px;height:36px;background:var(--border);}

/* TABS */
.tabs{flex-shrink:0;display:flex;border-bottom:1px solid var(--border);background:rgba(0,0,0,.3);}
.tab{padding:8px 18px;font-family:var(--sans);font-size:10px;font-weight:600;letter-spacing:.15em;
  text-transform:uppercase;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;transition:.15s;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--c);border-bottom-color:var(--c);}
.btn{padding:5px 12px;font-family:var(--sans);font-size:9px;font-weight:700;letter-spacing:.12em;
  text-transform:uppercase;border:1px solid var(--border);border-radius:3px;
  background:rgba(0,210,255,.05);color:var(--c);cursor:pointer;transition:.15s;margin-left:auto;}
.btn:hover{background:rgba(0,210,255,.12);border-color:var(--c);}
.btn.green{border-color:var(--g);color:var(--g);background:rgba(0,255,127,.05);}
.btn.green:hover{background:rgba(0,255,127,.12);}
.btn.red{border-color:var(--r);color:var(--r);background:rgba(255,77,77,.05);}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:12px 16px;}
.tab-panel{display:none;animation:fadein .2s;}
.tab-panel.active{display:block;}

/* TABLE */
.trades-table{width:100%;border-collapse:collapse;font-size:10.5px;}
.trades-table th{padding:5px 8px;text-align:left;font-family:var(--sans);font-size:8px;
  font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);
  border-bottom:1px solid var(--border);white-space:nowrap;}
.trades-table td{padding:7px 8px;border-bottom:1px solid rgba(0,210,255,.05);vertical-align:middle;}
.trades-table tr:hover td{background:rgba(0,210,255,.03);}
.asset-badge{display:inline-block;padding:2px 6px;border-radius:3px;font-family:var(--sans);
  font-size:10px;font-weight:700;letter-spacing:.08em;}
.badge-long{background:rgba(0,255,127,.12);color:var(--g);border:1px solid rgba(0,255,127,.2);}
.badge-short{background:rgba(255,77,77,.12);color:var(--r);border:1px solid rgba(255,77,77,.2);}
.pnl-pos{color:var(--g);font-weight:700;}
.pnl-neg{color:var(--r);font-weight:700;}
.pnl-null{color:var(--dim);}
.status-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;}
.status-dot.active{background:var(--g);animation:blink 1.5s infinite;}
.status-dot.closed{background:var(--dim);}
.status-dot.cancelled{background:var(--r);}
.price{font-family:var(--mono);color:var(--text);}
.dim{color:var(--dim);}

/* INLINE EDIT */
.pnl-input{background:rgba(0,210,255,.06);border:1px solid var(--c);border-radius:3px;
  color:var(--bright);font-family:var(--mono);font-size:10px;padding:2px 5px;width:75px;outline:none;}
.action-btns{display:flex;gap:4px;}
.action-btn{padding:2px 7px;font-family:var(--sans);font-size:8px;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;border-radius:3px;border:1px solid;cursor:pointer;transition:.12s;}
.action-btn.save{border-color:var(--g);color:var(--g);background:rgba(0,255,127,.06);}
.action-btn.save:hover{background:rgba(0,255,127,.15);}
.action-btn.close{border-color:var(--o);color:var(--o);background:rgba(255,183,0,.06);}
.action-btn.close:hover{background:rgba(255,183,0,.15);}
.action-btn.cancel{border-color:var(--r);color:var(--r);background:rgba(255,77,77,.06);}
.action-btn.cancel:hover{background:rgba(255,77,77,.15);}

/* ADD TRADE FORM */
.form-panel{background:var(--panel);border:1px solid var(--border);border-radius:6px;
  padding:14px 16px;margin-bottom:14px;}
.form-title{font-family:var(--sans);font-size:10px;font-weight:700;letter-spacing:.18em;
  text-transform:uppercase;color:var(--c);margin-bottom:10px;}
.form-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
.form-group{display:flex;flex-direction:column;gap:3px;}
.form-label{font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);}
.form-input,.form-select{background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:3px;
  color:var(--text);font-family:var(--mono);font-size:10px;padding:4px 7px;outline:none;
  transition:.12s;min-width:80px;}
.form-input:focus,.form-select:focus{border-color:var(--c);}
.form-select option{background:#0a1420;}

/* EMPTY STATE */
.empty{text-align:center;padding:40px 20px;color:var(--dim);}
.empty-title{font-family:var(--sans);font-size:12px;font-weight:600;letter-spacing:.15em;
  text-transform:uppercase;margin-bottom:6px;}

/* SIGNAL FEED */
.signal-item{background:var(--panel);border:1px solid var(--border);border-radius:5px;
  padding:10px 12px;margin-bottom:8px;animation:fadein .3s;}
.signal-header{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.signal-asset{font-family:var(--sans);font-size:12px;font-weight:700;}
.signal-time{font-size:9px;color:var(--dim);margin-left:auto;}
.signal-body{font-size:10px;color:var(--text);line-height:1.5;}
.signal-sizing{margin-top:6px;padding:6px 8px;background:rgba(0,0,0,.3);border-radius:3px;
  font-size:9px;color:var(--dim);}

/* SCROLLBAR */
.content::-webkit-scrollbar{width:4px;}
.content::-webkit-scrollbar-track{background:transparent;}
.content::-webkit-scrollbar-thumb{background:var(--muted);border-radius:2px;}
</style>
</head>
<body>

<div class="top-bar">
  <a href="/" class="back-link">← Dashboard</a>
  <div class="page-title">Trades & Bankroll</div>
  <div class="dot"></div>
</div>

<!-- Bankroll summary bar -->
<div class="bankroll-bar" id="bankrollBar">
  <div class="stat-block">
    <div class="stat-label">Bankroll</div>
    <div class="stat-value" id="statBankroll">$—</div>
  </div>
  <div class="divider"></div>
  <div class="stat-block">
    <div class="stat-label">Realized P&L</div>
    <div class="stat-value" id="statRealized">—</div>
  </div>
  <div class="divider"></div>
  <div class="stat-block">
    <div class="stat-label">Open P&L</div>
    <div class="stat-value" id="statOpen">—</div>
  </div>
  <div class="divider"></div>
  <div class="stat-block">
    <div class="stat-label">Win Rate</div>
    <div class="stat-value" id="statWinRate">—</div>
  </div>
  <div class="divider"></div>
  <div class="stat-block">
    <div class="stat-label">Open Trades</div>
    <div class="stat-value" id="statOpen2">—</div>
  </div>
</div>

<!-- Tabs -->
<div class="tabs">
  <div class="tab active" onclick="switchTab('active')">Active Trades</div>
  <div class="tab" onclick="switchTab('closed')">Closed</div>
  <div class="tab" onclick="switchTab('signals')">Signal Log</div>
  <button class="btn green" onclick="toggleAddForm()">+ Add Trade</button>
</div>

<div class="content">

  <!-- Add trade form (hidden by default) -->
  <div class="form-panel" id="addTradeForm" style="display:none;">
    <div class="form-title">Log New Trade</div>
    <div class="form-row">
      <div class="form-group">
        <div class="form-label">Asset</div>
        <input class="form-input" id="fAsset" placeholder="BTC" style="width:70px;">
      </div>
      <div class="form-group">
        <div class="form-label">Direction</div>
        <select class="form-select" id="fDir" style="width:80px;">
          <option value="LONG">LONG</option>
          <option value="SHORT">SHORT</option>
        </select>
      </div>
      <div class="form-group">
        <div class="form-label">Entry $</div>
        <input class="form-input" id="fEntry" placeholder="65000" type="number">
      </div>
      <div class="form-group">
        <div class="form-label">Stop Loss $</div>
        <input class="form-input" id="fSL" placeholder="64000" type="number">
      </div>
      <div class="form-group">
        <div class="form-label">TP1 $</div>
        <input class="form-input" id="fTP1" placeholder="67000" type="number">
      </div>
      <div class="form-group">
        <div class="form-label">TP2 $</div>
        <input class="form-input" id="fTP2" placeholder="optional" type="number">
      </div>
      <div class="form-group">
        <div class="form-label">Risk %</div>
        <select class="form-select" id="fRisk" style="width:65px;">
          <option value="1">1%</option>
          <option value="2">2%</option>
          <option value="3">3%</option>
        </select>
      </div>
      <div class="form-group">
        <div class="form-label">Leverage</div>
        <input class="form-input" id="fLev" placeholder="1" value="1" type="number" style="width:55px;">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group" style="flex:1;">
        <div class="form-label">Signal Notes</div>
        <input class="form-input" id="fNotes" placeholder="Dr. Profit BTC long signal..." style="width:100%;">
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-top:4px;">
      <button class="btn green" onclick="addTrade()">Log Trade</button>
      <button class="btn" onclick="toggleAddForm()">Cancel</button>
    </div>
  </div>

  <!-- Active trades tab -->
  <div class="tab-panel active" id="tab-active">
    <div id="activeTradesBody"></div>
  </div>

  <!-- Closed trades tab -->
  <div class="tab-panel" id="tab-closed">
    <div id="closedTradesBody"></div>
  </div>

  <!-- Signal log tab -->
  <div class="tab-panel" id="tab-signals">
    <div id="signalLogBody"></div>
  </div>

</div>

<script>
const API = '';
let _data = null;

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  await loadTrades();
  setInterval(loadTrades, 15000);
}

async function loadTrades() {
  try {
    const r = await fetch(`${API}/api/trades`);
    _data = await r.json();
    renderBankroll(_data.bankroll_summary);
    renderActive(_data.active);
    renderClosed(_data.closed);
    await loadSignalLog();
  } catch(e) {
    console.error('Load error:', e);
  }
}

// ── Bankroll ──────────────────────────────────────────────────────────────────
function renderBankroll(s) {
  document.getElementById('statBankroll').textContent = fmt$(s.bankroll);
  const rEl = document.getElementById('statRealized');
  rEl.textContent = fmtPnl(s.realized_pnl);
  rEl.className = 'stat-value ' + pnlClass(s.realized_pnl);
  const oEl = document.getElementById('statOpen');
  oEl.textContent = fmtPnl(s.open_pnl);
  oEl.className = 'stat-value ' + pnlClass(s.open_pnl);
  document.getElementById('statWinRate').textContent = s.win_rate + '%';
  document.getElementById('statOpen2').textContent = s.open_trades;
}

// ── Active trades ─────────────────────────────────────────────────────────────
function renderActive(trades) {
  const el = document.getElementById('activeTradesBody');
  if (!trades || !trades.length) {
    el.innerHTML = '<div class="empty"><div class="empty-title">No Active Trades</div><div>Waiting for Dr. Profit signals or add manually.</div></div>';
    return;
  }
  let html = `<table class="trades-table">
    <thead><tr>
      <th>Asset</th><th>Direction</th><th>Entry</th><th>SL</th><th>TP</th>
      <th>Size</th><th>Risk</th><th>Current P&L</th><th>Opened</th><th>Actions</th>
    </tr></thead><tbody>`;
  for (const t of trades) {
    const tps = (t.take_profit||[]).map(p=>fmt$(p)).join(' / ') || '—';
    html += `<tr id="row-${t.id}">
      <td><span class="asset-badge ${t.direction==='LONG'?'badge-long':'badge-short'}">${t.asset}</span></td>
      <td><span class="${t.direction==='LONG'?'pnl-pos':'pnl-neg'}">${t.direction}</span></td>
      <td class="price">${fmt$(t.entry_price)}</td>
      <td class="price dim">${t.stop_loss ? fmt$(t.stop_loss) : '—'}</td>
      <td class="price dim">${tps}</td>
      <td class="dim">${t.position_size} ${t.asset}<br><span style="color:var(--dim);font-size:9px;">${fmt$(t.notional)} notional</span></td>
      <td class="dim">${t.risk_pct}%  (${fmt$(t.risk_usd)})</td>
      <td id="pnl-${t.id}">
        <input class="pnl-input" id="input-${t.id}" type="number" step="0.01"
          value="${t.pnl !== null ? t.pnl : ''}" placeholder="enter P&L">
      </td>
      <td class="dim" style="font-size:9px;">${t.opened_at ? t.opened_at.slice(0,10) : '—'}</td>
      <td>
        <div class="action-btns">
          <button class="action-btn save" onclick="savePnl('${t.id}')">Save</button>
          <button class="action-btn close" onclick="closeTrade('${t.id}')">Close</button>
          <button class="action-btn cancel" onclick="cancelTrade('${t.id}')">✕</button>
        </div>
      </td>
    </tr>`;
  }
  html += '</tbody></table>';
  el.innerHTML = html;
}

// ── Closed trades ─────────────────────────────────────────────────────────────
function renderClosed(trades) {
  const el = document.getElementById('closedTradesBody');
  if (!trades || !trades.length) {
    el.innerHTML = '<div class="empty"><div class="empty-title">No Closed Trades</div></div>';
    return;
  }
  let html = `<table class="trades-table">
    <thead><tr>
      <th>Asset</th><th>Dir</th><th>Entry</th><th>Exit</th><th>Size</th>
      <th>P&L</th><th>Result</th><th>Opened</th><th>Closed</th>
    </tr></thead><tbody>`;
  for (const t of [...trades].reverse()) {
    const won = (t.pnl||0) > 0;
    html += `<tr>
      <td><span class="asset-badge ${t.direction==='LONG'?'badge-long':'badge-short'}">${t.asset}</span></td>
      <td class="${t.direction==='LONG'?'pnl-pos':'pnl-neg'}">${t.direction}</td>
      <td class="price">${fmt$(t.entry_price)}</td>
      <td class="price dim">${t.exit_price ? fmt$(t.exit_price) : '—'}</td>
      <td class="dim">${t.position_size} ${t.asset}</td>
      <td class="${won?'pnl-pos':'pnl-neg'}">${fmtPnl(t.pnl)}</td>
      <td><span style="color:${won?'var(--g)':'var(--r)'};">${won?'WIN':'LOSS'}</span></td>
      <td class="dim" style="font-size:9px;">${(t.opened_at||'').slice(0,10)}</td>
      <td class="dim" style="font-size:9px;">${(t.closed_at||'').slice(0,10)}</td>
    </tr>`;
  }
  html += '</tbody></table>';
  el.innerHTML = html;
}

// ── Signal log ────────────────────────────────────────────────────────────────
async function loadSignalLog() {
  const el = document.getElementById('signalLogBody');
  try {
    const r = await fetch(`${API}/api/signal_log`);
    const d = await r.json();
    if (!d.entries || !d.entries.length) {
      el.innerHTML = '<div class="empty"><div class="empty-title">No Signals Yet</div><div>Configure Dr. Profit monitor to see live signals here.</div></div>';
      return;
    }
    let html = '';
    for (const sig of d.entries.slice().reverse()) {
      const isLong = sig.direction === 'LONG';
      html += `<div class="signal-item">
        <div class="signal-header">
          <span class="signal-asset ${isLong?'pnl-pos':'pnl-neg'}">${sig.asset} ${sig.direction}</span>
          <span class="dim">Entry: ${fmt$(sig.entry)}</span>
          ${sig.stop_loss ? `<span class="dim">SL: ${fmt$(sig.stop_loss)}</span>` : ''}
          <span class="signal-time">${sig.ts||''}</span>
        </div>
        <div class="signal-sizing">${sig.brief||''}</div>
      </div>`;
    }
    el.innerHTML = html;
  } catch(e) {
    el.innerHTML = '<div class="empty"><div class="empty-title">Signal log unavailable</div></div>';
  }
}

// ── Actions ───────────────────────────────────────────────────────────────────
async function savePnl(id) {
  const val = parseFloat(document.getElementById(`input-${id}`)?.value);
  if (isNaN(val)) return;
  await fetch(`${API}/api/trades/${id}`, {
    method:'PATCH', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({pnl: val})
  });
  await loadTrades();
}

async function closeTrade(id) {
  const val = parseFloat(document.getElementById(`input-${id}`)?.value);
  const pnl = isNaN(val) ? 0 : val;
  if (!confirm(`Close trade with P&L $${pnl.toFixed(2)}?`)) return;
  await fetch(`${API}/api/trades/${id}/close`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({pnl})
  });
  await loadTrades();
}

async function cancelTrade(id) {
  if (!confirm('Cancel this trade (no PnL recorded)?')) return;
  await fetch(`${API}/api/trades/${id}/cancel`, {method:'POST'});
  await loadTrades();
}

async function addTrade() {
  const asset    = document.getElementById('fAsset').value.trim().toUpperCase();
  const dir      = document.getElementById('fDir').value;
  const entry    = parseFloat(document.getElementById('fEntry').value);
  const sl       = parseFloat(document.getElementById('fSL').value) || null;
  const tp1      = parseFloat(document.getElementById('fTP1').value) || null;
  const tp2      = parseFloat(document.getElementById('fTP2').value) || null;
  const riskPct  = parseFloat(document.getElementById('fRisk').value);
  const lev      = parseInt(document.getElementById('fLev').value) || 1;
  const notes    = document.getElementById('fNotes').value.trim();

  if (!asset || isNaN(entry)) { alert('Asset and entry price required.'); return; }

  const tps = [tp1, tp2].filter(v => v !== null && !isNaN(v));
  await fetch(`${API}/api/trades`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      asset, direction:dir, entry_price:entry,
      stop_loss:sl, take_profit:tps, risk_pct:riskPct,
      leverage:lev, signal_text:notes, source:'manual'
    })
  });
  document.getElementById('addTradeForm').style.display='none';
  clearForm();
  await loadTrades();
}

function clearForm() {
  ['fAsset','fEntry','fSL','fTP1','fTP2','fNotes'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.getElementById('fLev').value = '1';
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    const tabs = ['active','closed','signals'];
    t.classList.toggle('active', tabs[i]===name);
  });
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`tab-${name}`).classList.add('active');
}

function toggleAddForm() {
  const f = document.getElementById('addTradeForm');
  f.style.display = f.style.display==='none' ? 'block' : 'none';
}

function fmt$(n) {
  if (n === null || n === undefined) return '—';
  return '$' + Number(n).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function fmtPnl(n) {
  if (n === null || n === undefined) return '—';
  return (n >= 0 ? '+' : '') + fmt$(n);
}
function pnlClass(n) {
  if (n === null || n === undefined) return '';
  return n > 0 ? 'pos' : n < 0 ? 'neg' : '';
}

init();
